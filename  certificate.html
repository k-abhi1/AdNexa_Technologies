<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdNexa Technologies Pvt.Ltd - Certificate Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0a3d62;
            --secondary-color: #0066ff;
            --accent-color: #3498db;
            --light-color: #f8f9fa;
            --dark-color: #2c3e50;
            --text-color: #333;
            --bg-color: #fff;
            --card-bg: #fff;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verify-wrapper {
            width: 100%;
            max-width: 500px;
        }

        .verify-container {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .verify-container:hover {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .verify-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .verify-header h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .verify-header p {
            color: var(--text-color);
            opacity: 0.8;
        }

        .verify-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        .form-group input {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        .verify-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .verify-btn:hover {
            background-color: #229954;
            transform: translateY(-2px);
        }

        .verify-result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f0f8ff;
            border-left: 4px solid var(--secondary-color);
            display: none;
        }

        .verify-result.show {
            display: block;
        }

        .verify-result.success {
            border-left-color: #2ecc71;
        }

        .verify-result.error {
            border-left-color: #e74c3c;
        }

        .verify-result h4 {
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .verify-result p {
            margin-bottom: 5px;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .back-link a:hover {
            color: var(--secondary-color);
            text-decoration: underline;
        }

        /* ========== MEDIA QUERIES ========== */
        @media (max-width: 768px) {
            .verify-container {
                padding: 30px 20px;
            }
            .verify-header h2 {
                font-size: 1.8rem;
            }
            .form-group input {
                padding: 12px 14px;
            }
            .verify-btn {
                padding: 14px 18px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .verify-container {
                padding: 25px 15px;
            }
            .verify-header h2 {
                font-size: 1.6rem;
            }
            .verify-header p {
                font-size: 0.95rem;
            }
            .form-group label {
                font-size: 0.95rem;
            }
            .form-group input {
                padding: 12px;
                font-size: 0.95rem;
            }
            .verify-btn {
                padding: 12px 16px;
            }
            .verify-result {
                padding: 15px;
            }
            .verify-result h4 {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 360px) {
            .verify-header h2 {
                font-size: 1.4rem;
            }
            .verify-header p {
                font-size: 0.9rem;
            }
            .form-group input {
                padding: 10px;
            }
            .verify-btn {
                padding: 10px 14px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="verify-wrapper">
        <div class="verify-container">
            <div class="verify-header">
                <h2>Certificate Verification</h2>
                <p>Enter your unique certificate number to verify authenticity</p>
            </div>

            <div class="verify-form">
                <div class="form-group">
                    <label for="certNumber">Certificate Number</label>
                    <input type="text" id="certNumber" placeholder="Certificate ID" autofocus>
                </div>
                <button class="verify-btn" id="verifyBtn">Verify Certificate</button>
            </div>

            <div class="verify-result" id="verifyResult">
                <h4>Verification Result</h4>
                <p id="resultMessage"></p>
            </div>

            <div class="back-link">
                <a href="../"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const verifyBtn = document.getElementById('verifyBtn');
        const certNumberInput = document.getElementById('certNumber');
        const verifyResult = document.getElementById('verifyResult');
        const resultMessage = document.getElementById('resultMessage');

        verifyBtn.addEventListener('click', async () => {
            const certNumber = certNumberInput.value.trim();

            if (certNumber === '') {
                showResult('Please enter a certificate number.', 'error');
                return;
            }

            try {
                const response = await fetch('./data.json');
                const data = await response.json();

                const certificate = data.certificates.find(
                    cert => cert.certificateNo === certNumber
                );

                if (!certificate) {
                    showResult(`❌ Certificate <strong>${certNumber}</strong> not found.`, 'error');
                    return;
                }

                let output = `
                    <strong>Certificate Verified ✅</strong><br><br>
                    <strong>Name:</strong> ${certificate.candidate.name}<br>
                `;

                if (certificate.candidate.college) {
                    output += `<strong>College:</strong> ${certificate.candidate.college}<br>`;
                }

                if (certificate.candidate.registrationNo) {
                    output += `<strong>Registration No:</strong> ${certificate.candidate.registrationNo}<br>`;
                }

                if (certificate.domain) {
                    output += `<br><strong>Internship Domain:</strong> ${certificate.domain}<br>`;
                }

                output += `<br><strong>Internship Details:</strong><br>`;

                certificate.programs.forEach((program, index) => {
                    output += `
                        <br><strong>${index + 1}. Mode:</strong> ${program.mode}<br>
                        <strong>From:</strong> ${program.duration.from}<br>
                        <strong>To:</strong> ${program.duration.to}<br>
                    `;
                });

                showResult(output, 'success');

            } catch (error) {
                console.error(error);
                showResult('⚠️ Unable to load certificate data.', 'error');
            }
        });

        function showResult(message, type) {
            resultMessage.innerHTML = message;
            verifyResult.className = `verify-result show ${type}`;
        }
    </script>
</body>
</html>

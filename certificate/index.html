<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
   <title> Certificate Verification| TrionexaTechnologies Pvt.Ltd </title>
    <link rel="icon" href="unnamed (1)-modified.png" type="image/x-icon">
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #e9eef5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,102,255,0.08) 0%, rgba(0,102,255,0) 70%);
      border-radius: 50%;
      z-index: 0;
      animation: float 20s infinite ease-in-out;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -5%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,102,255,0.05) 0%, rgba(0,102,255,0) 70%);
      border-radius: 50%;
      z-index: 0;
      animation: float 25s infinite reverse ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(30px, 20px) rotate(5deg); }
    }

    .verify-wrapper {
      width: 100%;
      max-width: 550px;
      z-index: 1;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .verify-container {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 2.5rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 102, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .verify-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 40px -12px rgba(0, 102, 255, 0.2);
    }

    .verify-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .verify-header h2 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #0B2B5E, #1E4A8B);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .verify-header p {
      color: #4b5563;
      font-size: 0.95rem;
    }

    .verify-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1f2937;
      font-size: 0.9rem;
    }

    .form-group input {
      padding: 0.9rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 60px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      background: #fff;
    }

    .form-group input:focus {
      outline: none;
      border-color: #0066ff;
      box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
    }

    .verify-btn {
      background: #0066ff;
      color: white;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 60px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 12px rgba(0, 102, 255, 0.2);
    }

    .verify-btn:hover {
      background: #0052cc;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
    }

    .verify-btn:active {
      transform: translateY(0);
    }

    .verify-btn i {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .verify-btn:hover i {
      transform: translateX(3px);
    }

    /* Loading state */
    .verify-btn.loading {
      background: #4b5563;
      pointer-events: none;
    }

    .verify-btn.loading i {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .verify-result {
      margin-top: 1.8rem;
      padding: 1.2rem;
      border-radius: 20px;
      background: #f8fafc;
      border-left: 4px solid #0066ff;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .verify-result.show {
      display: block;
    }

    .verify-result.success {
      border-left-color: #10b981;
      background: #f0fdf4;
    }

    .verify-result.error {
      border-left-color: #ef4444;
      background: #fef2f2;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
    }

    .result-header i {
      font-size: 1.2rem;
    }

    .result-header h4 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #1f2937;
    }

    .result-content {
      font-size: 0.9rem;
      line-height: 1.5;
      color: #374151;
    }

    .result-content strong {
      color: #1f2937;
    }

    .back-link {
      text-align: center;
      margin-top: 1.8rem;
    }

    .back-link a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #4b5563;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .back-link a:hover {
      color: #0066ff;
      gap: 0.7rem;
    }

    /* Responsive */
    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }
      .verify-container {
        padding: 1.5rem;
      }
      .verify-header h2 {
        font-size: 1.6rem;
      }
      .verify-header p {
        font-size: 0.85rem;
      }
      .form-group input {
        padding: 0.8rem 1rem;
      }
      .verify-btn {
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="verify-wrapper">
    <div class="verify-container">
      <div class="verify-header">
        <h2>Certificate Verification</h2>
        <p>Enter your unique certificate number to verify authenticity</p>
      </div>

      <div class="verify-form">
        <div class="form-group">
          <label for="certNumber">Certificate Number</label>
          <input type="text" id="certNumber" placeholder="e.g., ADN-2024-001" autofocus>
        </div>
        <button class="verify-btn" id="verifyBtn">
          <i class="fas fa-check-circle"></i> Verify Certificate
        </button>
      </div>

      <div class="verify-result" id="verifyResult">
        <div class="result-header">
          <i class="fas fa-info-circle"></i>
          <h4>Verification Result</h4>
        </div>
        <div class="result-content" id="resultMessage"></div>
      </div>

      <div class="back-link">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    const verifyBtn = document.getElementById('verifyBtn');
    const certNumberInput = document.getElementById('certNumber');
    const verifyResult = document.getElementById('verifyResult');
    const resultMessage = document.getElementById('resultMessage');

    async function verifyCertificate(certNumber) {
      try {
        const response = await fetch('./data.json');
        if (!response.ok) throw new Error('Failed to load certificate data');
        const data = await response.json();

        const certificate = data.certificates?.find(
          cert => cert.certificateNo === certNumber
        );

        if (!certificate) {
          return { success: false, message: `❌ Certificate <strong>${certNumber}</strong> not found. Please check the number and try again.` };
        }

        // Build detailed output
        let output = `<strong>Certificate Verified ✅</strong><br><br>`;
        output += `<strong>Name:</strong> ${escapeHtml(certificate.candidate.name)}<br>`;
        if (certificate.candidate.college) {
          output += `<strong>College:</strong> ${escapeHtml(certificate.candidate.college)}<br>`;
        }
        if (certificate.candidate.registrationNo) {
          output += `<strong>Registration No:</strong> ${escapeHtml(certificate.candidate.registrationNo)}<br>`;
        }
        if (certificate.domain) {
          output += `<br><strong>Internship Domain:</strong> ${escapeHtml(certificate.domain)}<br>`;
        }
        output += `<br><strong>Internship Details:</strong><br>`;
        certificate.programs.forEach((program, index) => {
          output += `
            <br><strong>${index + 1}. Mode:</strong> ${escapeHtml(program.mode)}<br>
            <strong>From:</strong> ${escapeHtml(program.duration.from)}<br>
            <strong>To:</strong> ${escapeHtml(program.duration.to)}<br>
          `;
        });
        return { success: true, message: output };
      } catch (error) {
        console.error(error);
        return { success: false, message: '⚠️ Unable to load certificate data. Please try again later.' };
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function showResult(message, type) {
      resultMessage.innerHTML = message;
      verifyResult.className = `verify-result show ${type}`;
      // Update icon in header based on type
      const headerIcon = verifyResult.querySelector('.result-header i');
      const headerTitle = verifyResult.querySelector('.result-header h4');
      if (type === 'success') {
        headerIcon.className = 'fas fa-check-circle';
        headerTitle.textContent = 'Verification Successful';
      } else if (type === 'error') {
        headerIcon.className = 'fas fa-exclamation-circle';
        headerTitle.textContent = 'Verification Failed';
      } else {
        headerIcon.className = 'fas fa-info-circle';
        headerTitle.textContent = 'Verification Result';
      }
    }

    verifyBtn.addEventListener('click', async () => {
      const certNumber = certNumberInput.value.trim();

      if (certNumber === '') {
        showResult('Please enter a certificate number.', 'error');
        return;
      }

      // Show loading state
      const originalText = verifyBtn.innerHTML;
      verifyBtn.innerHTML = '<i class="fas fa-spinner"></i> Verifying...';
      verifyBtn.classList.add('loading');
      verifyBtn.disabled = true;

      const result = await verifyCertificate(certNumber);

      // Restore button
      verifyBtn.innerHTML = originalText;
      verifyBtn.classList.remove('loading');
      verifyBtn.disabled = false;

      if (result.success) {
        showResult(result.message, 'success');
      } else {
        showResult(result.message, 'error');
      }
    });

    // Allow Enter key to submit
    certNumberInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        verifyBtn.click();
      }
    });
  </script>
</body>
</html>
